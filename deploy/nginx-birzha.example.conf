# Пример для sites-available (скопируйте и подставьте server_name, root).
# Клиент запрашивает /api/... — прокси переписывает на бэкенд без префикса /api (как Vite dev proxy).
#
# Если файл подключается из nginx `http { include sites-enabled/*; }`, директива ниже валидна на этом уровне.
# Для публичного контура добавляйте HTTPS через certbot/nginx и держите API только на 127.0.0.1:3000.
limit_req_zone $binary_remote_addr zone=birzha_auth_login:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root /opt/birzha/apps/web/dist;
    index index.html;

    location = /api/auth/login {
        limit_req zone=birzha_auth_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
