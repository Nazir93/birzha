# Ручной деплой на VPS: GitHub Actions подключается по SSH и запускает deploy/server-update.sh на сервере.
# Секреты: BIRZHA_DEPLOY_HOST, BIRZHA_DEPLOY_USER, BIRZHA_SSH_PRIVATE_KEY; опционально BIRZHA_DEPLOY_PATH.
name: Deploy to server

on:
  workflow_dispatch:
    inputs:
      backup_confirmed:
        description: "Свежий pg_dump/backup перед db:push сделан или db:push не нужен"
        required: true
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BIRZHA_BACKUP_CONFIRMED: ${{ inputs.backup_confirmed && '1' || '0' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BIRZHA_DEPLOY_HOST }}
          username: ${{ secrets.BIRZHA_DEPLOY_USER }}
          key: ${{ secrets.BIRZHA_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            ROOT='${{ secrets.BIRZHA_DEPLOY_PATH }}'
            if [ -z "$ROOT" ]; then ROOT="/opt/birzha"; fi
            cd "$ROOT"
            BIRZHA_BACKUP_CONFIRMED="$BIRZHA_BACKUP_CONFIRMED" bash deploy/server-update.sh
